<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Label Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container py-4 print-hide" style="max-width: 900px;">
    <h1>Label Generator</h1>
    <p>Generate printable asset labels from exported JSON data. Upload or paste your JSON file, configure settings, then use your browser's print function.</p>

    <h2 class="h5 mt-4">JSON Data</h2>
    <div class="mb-4">
      <div class="mb-3">
        <label for="fileInput" class="form-label">Upload JSON file</label>
        <input type="file" class="form-control" id="fileInput" accept=".json,application/json">
      </div>
      <p class="text-center text-muted">OR paste JSON below:</p>
      <textarea id="jsonInput" class="form-control font-monospace" rows="6" placeholder='{"headers": [...], "data": [...]}'></textarea>
      <div class="mt-2">
        <span id="statusMsg"></span>
      </div>
    </div>

    <h2 class="h5 mt-4">Label Settings</h2>
    <div class="row g-3">
      <div class="col-6">
        <label for="measureType" class="form-label">Measure Type</label>
        <input type="text" class="form-control" id="measureType" value="in">
      </div>
      <div class="col-6">
        <label for="labelHeight" class="form-label">Label Height</label>
        <input type="number" class="form-control" id="labelHeight" value="1" step="0.01">
      </div>
      <div class="col-6">
        <label for="labelWidth" class="form-label">Label Width</label>
        <input type="number" class="form-control" id="labelWidth" value="2.63" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageWidth" class="form-label">Page Width</label>
        <input type="number" class="form-control" id="pageWidth" value="8.5" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageHeight" class="form-label">Page Height</label>
        <input type="number" class="form-control" id="pageHeight" value="11" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageTopPadding" class="form-label">Page Top Padding</label>
        <input type="number" class="form-control" id="pageTopPadding" value="0.5" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageBottomPadding" class="form-label">Page Bottom Padding</label>
        <input type="number" class="form-control" id="pageBottomPadding" value="0.5" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageLeftPadding" class="form-label">Page Left Padding</label>
        <input type="number" class="form-control" id="pageLeftPadding" value="0.19" step="0.01">
      </div>
      <div class="col-6">
        <label for="pageRightPadding" class="form-label">Page Right Padding</label>
        <input type="number" class="form-control" id="pageRightPadding" value="0.19" step="0.01">
      </div>
      <div class="col-6">
        <label for="baseURL" class="form-label">Base URL</label>
        <input type="text" class="form-control" id="baseURL" value="">
      </div>
      <div class="col-6">
        <label for="skipLabels" class="form-label">Skip First Labels</label>
        <input type="number" class="form-control" id="skipLabels" value="0" min="0" step="1">
      </div>
    </div>

    <div class="form-check mt-4">
      <input type="checkbox" class="form-check-input" id="printLocationRow" checked>
      <label class="form-check-label" for="printLocationRow">Print Location Row</label>
    </div>

    <p class="mt-4">QR Code URL format: <code id="qrExample"></code></p>

    <button class="btn btn-primary btn-lg w-100 mt-4" onclick="window.print()">Print</button>
  </div>

  <div id="labelOutput" class="label-output"></div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
