name: Frontend

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

on:
  workflow_call:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      - name: Run Lint
        run: pnpm run lint:ci
        working-directory: frontend

      - name: Run Typecheck
        run: pnpm run typecheck
        working-directory: frontend

  build:
    name: Next.js Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0

      - uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f
        with:
          node-version: lts/*

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install
        working-directory: frontend

      # Verifies the Next.js app compiles and produces standalone output. The
      # frontend is no longer embedded in the Go binary; it is served by its own
      # Node server in the Docker image.
      - name: Build frontend
        run: pnpm run build
        working-directory: frontend

  # The Vitest integration test jobs (integration-tests / integration-tests-pgsql)
  # are parked during the Next.js migration: the test/ directory and the test:ci
  # package script were removed (migration plan decision 4). Re-add these jobs
  # once the frontend test suite is restored on the new stack.
