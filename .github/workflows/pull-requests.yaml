name: Pull Request CI

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

on:
  pull_request:
    branches:
      - main
      - vnext

    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/partial-backend.yaml'
      - '.github/workflows/partial-frontend.yaml'
      - '.github/workflows/pull-requests.yaml'

jobs:
  backend-tests:
    name: "Backend Server Tests"
    uses: ./.github/workflows/partial-backend.yaml

  frontend-tests:
    name: "Frontend Tests"
    uses: ./.github/workflows/partial-frontend.yaml

  # The End-to-End Playwright job (e2e-partial.yaml) is parked during the
  # Next.js migration — the Playwright suite under frontend/test was removed
  # (migration plan decision 4). Re-add it once the E2E suite is restored.