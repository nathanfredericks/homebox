version: "3"

env:
  HBOX_LOG_LEVEL: debug
  HBOX_DATABASE_DRIVER: sqlite3
  HBOX_DATABASE_SQLITE_PATH: .data/homebox.db?_pragma=busy_timeout=1000&_pragma=journal_mode=WAL&_fk=1&_time_format=sqlite
  HBOX_OPTIONS_ALLOW_REGISTRATION: true
  UNSAFE_DISABLE_PASSWORD_PROJECTION: "yes_i_am_sure"
  HBOX_AUTH_API_KEY_PEPPER: "dev-only-pepper-not-for-production-use-32b+"
tasks:
  setup:
    desc: Install development dependencies
    cmds:
      - go install github.com/swaggo/swag/cmd/swag@latest
      - go install github.com/pressly/goose/v3/cmd/goose@v3.8.0
      - cd backend && go mod tidy
      - cd frontend && pnpm install

  swag:
    desc: Generate swagger docs
    dir: backend/app/api/static/
    vars:
      API: "../"
      INTERNAL: "../../../internal"
      PKGS: "../../../pkgs"
    cmds:
      - swag init --dir={{ .API }},{{ .INTERNAL }}/core/services,{{ .INTERNAL }}/data/repo --parseDependency
      - npx -y -p swagger2openapi swagger2openapi --outfile ./docs/openapi-3.json ./docs/swagger.json
      - npx -y -p swagger2openapi swagger2openapi --yaml --outfile ./docs/openapi-3.yaml ./docs/swagger.json
      - cp -r ./docs/swagger.json ../../../../docs/public/api/swagger-2.0.json
      - cp -r ./docs/swagger.yaml ../../../../docs/public/api/swagger-2.0.yaml
      - cp -r ./docs/openapi-3.json ../../../../docs/public/api/openapi-3.0.json
      - cp -r ./docs/openapi-3.yaml ../../../../docs/public/api/openapi-3.0.yaml
    sources:
      - "./backend/app/api/**/*"
      - "./backend/internal/data/**"
      - "./backend/internal/core/services/**/*"
      - "./backend/app/tools/typegen/main.go"
  typescript-types:
    desc: Generates typescript types from swagger definition
    cmds:
      - |
        pnpm dlx swagger-typescript-api generate \
          --no-client \
          --modular \
          --path ./backend/app/api/static/docs/swagger.json \
          --output ./frontend/lib/api/types
      - go run ./backend/app/tools/typegen/main.go ./frontend/lib/api/types/data-contracts.ts
    sources:
      - ./backend/app/tools/typegen/main.go
      - ./backend/app/api/static/docs/swagger.json

  generate:
    deps:
      - db:generate
    cmds:
      - task: swag
      - task: typescript-types

  go:run:
    env:
      HBOX_DEMO: true
    desc: Starts the backend api server (depends on generate task)
    dir: backend
    deps:
      - generate
    cmds:
      - go run ./app/api/ {{ .CLI_ARGS }}
    silent: false

  go:run:postgresql:
    env:
      HBOX_DEMO: true
      HBOX_DATABASE_DRIVER: postgres
      HBOX_DATABASE_USERNAME: homebox
      HBOX_DATABASE_PASSWORD: homebox
      HBOX_DATABASE_DATABASE: homebox
      HBOX_DATABASE_HOST: localhost
      HBOX_DATABASE_PORT: 5432
      HBOX_DATABASE_SSL_MODE: disable
    desc: Starts the backend api server with postgresql (depends on generate task)
    dir: backend
    deps:
      - generate
    cmds:
      - go run ./app/api/ {{ .CLI_ARGS }}
    silent: false

  go:ci:
    env:
      HBOX_DEMO: true
    desc: Runs all go test and lint related tasks
    dir: backend
    cmds:
      - go run ./app/api/ {{ .CLI_ARGS }} &
    silent: true

  go:ci:with-frontend:
      desc: Build the Next.js frontend (verification) then start the backend in CI mode
      dir: frontend
      cmds:
        - pnpm install
        # The Next.js app is no longer embedded in the Go binary; building it
        # here just verifies it compiles. The standalone server runs separately.
        - pnpm run build
        - task: go:ci
      silent: true

  go:test:
    desc: Runs all go tests using gotestsum - supports passing gotestsum args
    dir: backend
    cmds:
      - go test {{ .CLI_ARGS }} ./...

  go:coverage:
    desc: Runs all go tests with -race flag and generates a coverage report
    dir: backend
    cmds:
      - go test -race -coverprofile=coverage.out -covermode=atomic ./app/... ./internal/... ./pkgs/... -v -cover
    silent: true

  go:tidy:
    desc: Runs go mod tidy on the backend
    dir: backend
    cmds:
      - go mod tidy

  go:lint:
    desc: Runs golangci-lint
    dir: backend
    cmds:
      - golangci-lint run ./...

  go:all:
    desc: Runs all go test and lint related tasks
    cmds:
      - task: go:tidy
      - task: go:lint
      - task: go:test

  go:build:
    desc: Builds the backend binary
    dir: backend
    cmds:
      - go build -o ../build/backend ./app/api

  db:generate:
    desc: Run Entgo.io Code Generation
    dir: backend/internal/
    cmds:
      - |
        go generate ./...
    sources:
      - "./backend/internal/data/ent/schema/**/*"

  # ui:watch (vitest) is parked during the Next.js migration; see test:ci /
  # test:e2e below. Re-add once the frontend test suite is restored.

  ui:dev:
    desc: Run the Next.js dev server (:3000; /api proxied to the Go API on :7745)
    dir: frontend
    cmds:
      - pnpm dev

  ui:build:
    desc: Build the Next.js frontend (standalone output)
    dir: frontend
    cmds:
      - pnpm run build

  ui:fix:
    desc: Runs prettier and eslint on the frontend
    dir: frontend
    cmds:
      - pnpm run lint:fix

  ui:check:
    desc: Runs type checking
    dir: frontend
    cmds:
      - pnpm run typecheck

  # The frontend Vitest integration suite and the Playwright E2E suite (test:ci,
  # test:ci:postgresql, test:e2e) are parked during the Next.js migration — the
  # test/ directory and the test:ci / test:watch package scripts were removed
  # (migration plan decision 4). Re-add these once the frontend test suite is
  # restored on the new stack.

  pr:
    desc: Runs all tasks required for a PR
    cmds:
      - task: generate
      - task: go:all
      - task: ui:check
      - task: ui:fix
      - task: ui:build
